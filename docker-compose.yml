name: school_newsroom

services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    command: >
      sh -c "until nc -z db 5432;
      do sleep 1;
      done;
      python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: school_newsroom
      POSTGRES_USER: school_newsroom
      POSTGRES_PASSWORD: school_newsroom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

volumes:
  postgres_data:
